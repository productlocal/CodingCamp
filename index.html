<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <main class="container">
        <section class="balance-section">
            <p>Total Pengeluaran</p>
            <h1 id="total-balance">Rp 0</h1>
        </section>
        <section class="chart-section">
            <canvas id="expenseChart"></canvas>
        </section>
        <section class="form-section">
            <form id="expense-form">
                <div class="input-group">
                    <label for="item-name">Nama Barang</label>
                    <input type="text" id="item-name" placeholder="Contoh: Makan Siang" required>
                </div>
                <div class="input-group">
                    <label for="amount">Jumlah (Rp)</label>
                    <input type="number" id="amount" placeholder="Contoh: 25000" required>
                </div>
                <div class="input-group">
                    <label for="category">Kategori</label>
                    <select id="category" required>
                        <option value="" disabled selected>-- Pilih Kategori --</option>
                        <option value="Food">Makanan</option>
                        <option value="Transport">Transportasi</option>
                        <option value="Fun">Hiburan</option>
                    </select>
                </div>
                <button type="submit">Tambah Transaksi</button>
            </form>
        </section>
        <section class="transaction-section">
            <h3>Riwayat Transaksi</h3>
            <ul id="transaction-list">
            </ul>
        </section>
    </main>
    <script src="js/script.js"></script>

</body>
</html>
